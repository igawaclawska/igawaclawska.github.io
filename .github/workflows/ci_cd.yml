name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout main for production build
        uses: actions/checkout@v6
        with:
          ref: main
          path: repo-main

      - name: Checkout development for staging build
        uses: actions/checkout@v6
        with:
          ref: development
          path: repo-development

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            repo-main/portfolio/package-lock.json
            repo-development/portfolio/package-lock.json

      - name: Install production dependencies
        working-directory: repo-main/portfolio
        run: npm ci

      - name: Lint production app
        working-directory: repo-main/portfolio
        run: npm run lint --if-present

      - name: Build production app from main
        working-directory: repo-main/portfolio
        run: npm run build

      - name: Install staging dependencies
        working-directory: repo-development/portfolio
        run: npm ci

      - name: Lint staging app
        working-directory: repo-development/portfolio
        run: npm run lint --if-present

      - name: Build staging app from development
        working-directory: repo-development/portfolio
        run: npm run build -- --mode staging

      - name: Combine production root and staging path
        run: |
          mkdir -p final-dist/staging
          cp -R repo-main/portfolio/dist/. final-dist/
          cp -R repo-development/portfolio/dist/. final-dist/staging/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: final-dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
